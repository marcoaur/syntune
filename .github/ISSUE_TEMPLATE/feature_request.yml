name: ✨ Feature request
description: An idea to make Syntune better.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Describe the situation where you missed this feature.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would it work, from the user's point of view?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
