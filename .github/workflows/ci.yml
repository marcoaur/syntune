# Validação de todo PR (e da develop): sintaxe JS, JSONs válidos,
# paridade dos dicionários i18n e teste de empacotamento do Electron.
name: CI

on:
  pull_request:
  push:
    branches: [develop]

jobs:
  # Checagens rápidas (segundos) — sintaxe, JSON, i18n
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax check (all project JS)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          # Todo JS do projeto (cobre src/** e renderer/modules/** automaticamente).
          for f in **/*.js; do
            [[ "$f" == node_modules/* ]] && continue
            echo "node --check $f"
            node --check "$f"
          done

      - name: Validate JSON files
        run: |
          set -e
          for f in package.json locales/*.json; do
            echo "parse $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf-8'))"
          done

      - name: i18n key parity
        run: node scripts/check-i18n.js

  # Teste de empacotamento: garante que o app monta (sem gerar instaladores)
  pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (node:test)
        run: npm test

      - name: Electron pack test (dir only)
        run: npm run dist -- --dir --publish never
