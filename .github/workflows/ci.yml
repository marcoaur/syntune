# Validação de todo PR (e da develop): sintaxe JS, JSONs válidos,
# paridade dos dicionários i18n e teste de empacotamento do Electron.
name: CI

on:
  pull_request:
  push:
    branches: [develop]

jobs:
  # Checagens rápidas (segundos) — sintaxe, JSON, i18n
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Syntax check (all project JS)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          # Todo JS do projeto (cobre src/** e renderer/modules/** automaticamente).
          for f in **/*.js; do
            [[ "$f" == node_modules/* ]] && continue
            echo "node --check $f"
            node --check "$f"
          done

      - name: Validate JSON files
        run: |
          set -e
          for f in package.json locales/*.json; do
            echo "parse $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf-8'))"
          done

      - name: i18n key parity
        run: node scripts/check-i18n.js

  # Componentes Lit (migração por ilhas): bundle do electron-vite + testes de componente.
  # Cobre o que o `node --check` não pega (resolução de 'lit'/@lit/context + render no browser).
  web-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck IPC contract (tsc, no emit)
        run: npm run typecheck

      - name: Build bundle (electron-vite → out/)
        run: npm run build:vite

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Component tests (@web/test-runner)
        run: npm run test:wc

  # Teste de empacotamento multiplataforma: garante que o app monta em
  # Windows, macOS e Linux (sem gerar instaladores — só o app empacotado).
  pack:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (node:test)
        run: npm test

      - name: Electron pack test (dir only)
        run: npm run dist -- --dir --publish never

  # Smoke E2E: lança o app real e garante boot + render sem erro de JS.
  # Trava o merge p/ main (logo, o release) se o app não abrir.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke E2E (Electron via Playwright + xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e
