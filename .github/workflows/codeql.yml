# Análise de segurança estática (CodeQL) — roda em PRs, na develop/main
# e semanalmente, cobrindo o JavaScript do projeto.
name: CodeQL

on:
  push:
    branches: [main, stg, develop]
  pull_request:
    branches: [main, stg, develop]
  schedule:
    - cron: '30 4 * * 1' # toda segunda, 04:30 UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - uses: github/codeql-action/analyze@v4
