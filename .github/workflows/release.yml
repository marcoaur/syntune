# Build de produção a cada merge na main: gera os instaladores Windows e
# publica/atualiza a release com a tag v<versão do package.json>.
name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run dist

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          $exists = $true
          try { gh release view $tag | Out-Null } catch { $exists = $false }
          if (-not $exists) {
            gh release create $tag dist/Syntune-Setup.exe dist/Syntune-Portable.exe `
              --title "Syntune $tag" --generate-notes
          } else {
            gh release upload $tag dist/Syntune-Setup.exe dist/Syntune-Portable.exe --clobber
          }
