# Build de produção a cada merge na main: gera os instaladores de Windows,
# macOS e Linux e publica/atualiza a release com a tag v<versão do package.json>.
name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Builda os instaladores em cada plataforma (electron-builder usa o SO atual).
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        # --publish never: o electron-builder não publica sozinho; a release é
        # criada no job 'release' via gh, com os artefatos de todas as plataformas.
        run: npm run dist -- --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 1

  # Junta os artefatos das 3 plataformas e cria/atualiza a release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          tag="v${{ steps.ver.outputs.version }}"
          files=$(find artifacts -type f)
          echo "Assets a publicar:"; echo "$files"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" $files --clobber
          else
            gh release create "$tag" $files --title "Syntune $tag" --generate-notes
          fi
