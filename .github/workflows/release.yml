# Build de produção a cada merge na main: gera os instaladores Windows e
# publica/atualiza a release com a tag v<versão do package.json>.
name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        # --publish never: o electron-builder não deve tentar publicar sozinho
        # (a release é criada no passo seguinte via gh)
        run: npm run dist -- --publish never

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          # latest.yml + blockmap: metadados do electron-updater (auto-update do app)
          $assets = @(
            'dist/Syntune-Setup.exe',
            'dist/Syntune-Setup.exe.blockmap',
            'dist/Syntune-Portable.exe',
            'dist/latest.yml'
          )
          # try/catch não captura exit code de exe em pwsh: usar $LASTEXITCODE
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assets --title "Syntune $tag" --generate-notes
          } else {
            gh release upload $tag @assets --clobber
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }
