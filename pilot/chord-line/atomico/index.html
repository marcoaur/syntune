<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Piloto — chord-line (Atomico)</title>
  <style>
    body { background:#0d0d12; color:#eee; font:14px/1.5 system-ui; padding:40px; }
    .stage { background:#16161d; border-radius:12px; padding:28px 16px; max-width:820px; }
    h1 { font-size:15px; opacity:.8; } code { color:#9aa; }
    input[type=range] { width:100%; }
    #log { margin-top:16px; font:12px ui-monospace; color:#8c8; white-space:pre-wrap; min-height:40px; }
  </style>
  <script type="module" src="./chord-line.js"></script>
</head>
<body>
  <h1>Atomico — <code>&lt;chord-line&gt;</code> + <code>&lt;chord-mark&gt;</code></h1>
  <div class="stage">
    <chord-line id="line" start="0" end="12" accent="120,200,255" current="0">
      <chord-mark time="1"  label="G"></chord-mark>
      <chord-mark time="4"  label="D"></chord-mark>
      <chord-mark time="7"  label="Em"></chord-mark>
      <chord-mark time="10" label="C"></chord-mark>
    </chord-line>
  </div>
  <p>current: <input id="scrub" type="range" min="0" max="12" step="0.02" value="0"></p>
  <button id="play">▶ play</button>
  <div id="log">feedback dos filhos aparece aqui…</div>

  <script type="module">
    const line = document.getElementById('line');
    const scrub = document.getElementById('scrub');
    const log = document.getElementById('log');
    scrub.addEventListener('input', () => { line.current = +scrub.value; });
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'current') { scrub.value = e.data.value; line.current = +e.data.value; }
    });
    line.addEventListener('chordline-select', (e) => log.textContent = `select → ${JSON.stringify(e.detail)}`);
    line.addEventListener('chordline-edit', (e) => log.textContent = `edit → ${JSON.stringify(e.detail)}`);
    let raf, t0;
    document.getElementById('play').addEventListener('click', () => {
      cancelAnimationFrame(raf); t0 = performance.now() - (+scrub.value) * 1000;
      const tick = (now) => {
        const cur = Math.min(12, (now - t0) / 1000);
        scrub.value = cur; line.current = cur;
        if (cur < 12) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    });
  </script>
</body>
</html>
